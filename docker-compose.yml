version: "3.9"

services:
  # --- API Gateway ---
  api-gateway:
    build: ./services/api-gateway
    ports:
      - "${SERVER_PORT:-8080}:8080"
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - JWT_SECRET=${JWT_SECRET}
    depends_on:
      - auth-service
      - event-engine
      - telemetry-service
    networks:
      - fuel-net
    restart: unless-stopped

  # --- Auth Service ---
  auth-service:
    build: ./services/auth-service
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=${DB_NAME:-fuel_system}
      - DB_USER=${DB_USER:-fuel_admin}
      - DB_PASSWORD=${DB_PASSWORD}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRY=${JWT_EXPIRY:-3600}
    depends_on:
      - db
    networks:
      - fuel-net
    restart: unless-stopped

  # --- Event Engine ---
  event-engine:
    build: ./services/event-engine
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=${DB_NAME:-fuel_system}
      - DB_USER=${DB_USER:-fuel_admin}
      - DB_PASSWORD=${DB_PASSWORD}
    depends_on:
      - db
    networks:
      - fuel-net
    restart: unless-stopped

  # --- Telemetry Service ---
  telemetry-service:
    build: ./services/telemetry-service
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=${DB_NAME:-fuel_system}
      - DB_USER=${DB_USER:-fuel_admin}
      - DB_PASSWORD=${DB_PASSWORD}
      - SBC_HEARTBEAT_INTERVAL=${SBC_HEARTBEAT_INTERVAL:-30}
    depends_on:
      - db
    networks:
      - fuel-net
    restart: unless-stopped

  # --- Deployment Service ---
  deployment-service:
    build: ./services/deployment-service
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=${DB_NAME:-fuel_system}
      - DB_USER=${DB_USER:-fuel_admin}
      - DB_PASSWORD=${DB_PASSWORD}
    depends_on:
      - db
    networks:
      - fuel-net
    restart: unless-stopped

  # --- FormForce Integration Service ---
  formforce-service:
    build: ./services/formforce-service
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=${DB_NAME:-fuel_system}
      - DB_USER=${DB_USER:-fuel_admin}
      - DB_PASSWORD=${DB_PASSWORD}
      - FORMFORCE_API_URL=${FORMFORCE_API_URL}
      - FORMFORCE_API_KEY=${FORMFORCE_API_KEY}
      - FORMFORCE_ORG_ID=${FORMFORCE_ORG_ID}
      - FORMFORCE_SYNC_INTERVAL=${FORMFORCE_SYNC_INTERVAL:-300}
      - FORMFORCE_WEBHOOK_SECRET=${FORMFORCE_WEBHOOK_SECRET}
    depends_on:
      - db
      - api-gateway
    networks:
      - fuel-net
    restart: unless-stopped

  # --- Dashboard ---
  dashboard:
    build: ./dashboard
    ports:
      - "3000:3000"
    depends_on:
      - api-gateway
    networks:
      - fuel-net
    restart: unless-stopped

  # --- Database ---
  db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_DB=${DB_NAME:-fuel_system}
      - POSTGRES_USER=${DB_USER:-fuel_admin}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    volumes:
      - db-data:/var/lib/postgresql/data
      - ./infrastructure/db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - fuel-net
    restart: unless-stopped

volumes:
  db-data:

networks:
  fuel-net:
    driver: bridge
