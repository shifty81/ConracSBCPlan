version: "3.9"

services:
  # --- API Gateway ---
  api-gateway:
    build: ./services/api-gateway
    ports:
      - "${SERVER_PORT:-8080}:8080"
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - JWT_SECRET=${JWT_SECRET}
    depends_on:
      - auth-service
      - event-engine
      - telemetry-service
    networks:
      - nexus-net
    restart: unless-stopped

  # --- Auth Service ---
  auth-service:
    build: ./services/auth-service
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=${DB_NAME:-nexus}
      - DB_USER=${DB_USER:-nexus_admin}
      - DB_PASSWORD=${DB_PASSWORD}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRY=${JWT_EXPIRY:-3600}
    depends_on:
      - db
    networks:
      - nexus-net
    restart: unless-stopped

  # --- Event Engine ---
  event-engine:
    build: ./services/event-engine
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=${DB_NAME:-nexus}
      - DB_USER=${DB_USER:-nexus_admin}
      - DB_PASSWORD=${DB_PASSWORD}
    depends_on:
      - db
    networks:
      - nexus-net
    restart: unless-stopped

  # --- Telemetry Service ---
  telemetry-service:
    build: ./services/telemetry-service
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=${DB_NAME:-nexus}
      - DB_USER=${DB_USER:-nexus_admin}
      - DB_PASSWORD=${DB_PASSWORD}
      - SBC_HEARTBEAT_INTERVAL=${SBC_HEARTBEAT_INTERVAL:-30}
      - CARWASH_CYCLE_TIMEOUT=${CARWASH_CYCLE_TIMEOUT:-600}
      - CARWASH_ALERT_WATER_GALLONS=${CARWASH_ALERT_WATER_GALLONS:-100}
      - CARWASH_ALERT_CHEMICAL_GALLONS=${CARWASH_ALERT_CHEMICAL_GALLONS:-5}
    depends_on:
      - db
    networks:
      - nexus-net
    restart: unless-stopped

  # --- Deployment Service ---
  deployment-service:
    build: ./services/deployment-service
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=${DB_NAME:-nexus}
      - DB_USER=${DB_USER:-nexus_admin}
      - DB_PASSWORD=${DB_PASSWORD}
    depends_on:
      - db
    networks:
      - nexus-net
    restart: unless-stopped

  # --- Forms & Inspections Service ---
  forms-service:
    build: ./services/formforce-service
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=${DB_NAME:-nexus}
      - DB_USER=${DB_USER:-nexus_admin}
      - DB_PASSWORD=${DB_PASSWORD}
      - NEXUS_FORMS_WEBHOOK_SECRET=${NEXUS_FORMS_WEBHOOK_SECRET}
      - NEXUS_FORMS_SYNC_INTERVAL=${NEXUS_FORMS_SYNC_INTERVAL:-300}
    depends_on:
      - db
      - api-gateway
    networks:
      - nexus-net
    restart: unless-stopped

  # --- Vendor Management Service ---
  vendor-service:
    build: ./services/vendor-service
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=${DB_NAME:-nexus}
      - DB_USER=${DB_USER:-nexus_admin}
      - DB_PASSWORD=${DB_PASSWORD}
      - VENDOR_INSURANCE_WARNING_DAYS=${VENDOR_INSURANCE_WARNING_DAYS:-30}
    depends_on:
      - db
    networks:
      - nexus-net
    restart: unless-stopped

  # --- Card Encoding Service ---
  card-encoding-service:
    build: ./services/card-encoding-service
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=${DB_NAME:-nexus}
      - DB_USER=${DB_USER:-nexus_admin}
      - DB_PASSWORD=${DB_PASSWORD}
      - HID_READER_NAME=${HID_READER_NAME:-HID OMNIKEY 5427CK}
      - HID_FACILITY_CODE=${HID_FACILITY_CODE:-100}
      - HID_CARD_FORMAT=${HID_CARD_FORMAT:-iclass_se}
    depends_on:
      - db
    networks:
      - nexus-net
    restart: unless-stopped

  # --- Dashboard ---
  dashboard:
    build: ./dashboard
    ports:
      - "3000:3000"
    depends_on:
      - api-gateway
    networks:
      - nexus-net
    restart: unless-stopped

  # --- Database ---
  db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_DB=${DB_NAME:-nexus}
      - POSTGRES_USER=${DB_USER:-nexus_admin}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    volumes:
      - db-data:/var/lib/postgresql/data
      - ./infrastructure/db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - nexus-net
    restart: unless-stopped

volumes:
  db-data:

networks:
  nexus-net:
    driver: bridge
