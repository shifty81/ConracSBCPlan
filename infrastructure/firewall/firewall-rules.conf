# Firewall Rules — NEXUS Facility Operations Platform
# Apply with: iptables-restore < firewall-rules.conf
# or integrate into your site firewall management.

# --- Inbound Rules ---
# Allow HTTPS (dashboard + API)
# -A INPUT -p tcp --dport 443 -j ACCEPT

# Allow HTTP (redirect to HTTPS)
# -A INPUT -p tcp --dport 80 -j ACCEPT

# Allow PostgreSQL from internal network only
# -A INPUT -p tcp --dport 5432 -s 10.0.0.0/24 -j ACCEPT

# Allow SBC heartbeat / telemetry (via API Gateway on 443)
# SBCs connect outbound only — no inbound ports needed on SBC side

# --- Outbound Rules ---
# Allow HTTPS outbound (cloud backup, NTP)
# -A OUTPUT -p tcp --dport 443 -j ACCEPT

# Allow NTP for time sync
# -A OUTPUT -p udp --dport 123 -j ACCEPT

# --- Notes ---
# - SBC devices initiate outbound connections only
# - No inbound ports are exposed on SBC units
# - Camera VLAN is isolated from control network
# - Tank monitor cellular traffic is on a separate network segment
