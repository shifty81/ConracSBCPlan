<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 440" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <linearGradient id="hGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1a237e"/>
      <stop offset="100%" stop-color="#283593"/>
    </linearGradient>
    <filter id="ds" x="-2%" y="-2%" width="104%" height="106%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-opacity="0.12"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="440" rx="12" fill="#fafafa"/>

  <!-- Title -->
  <rect x="0" y="0" width="900" height="52" rx="12" fill="url(#hGrad)"/>
  <rect x="0" y="20" width="900" height="32" fill="url(#hGrad)"/>
  <text x="450" y="35" text-anchor="middle" fill="white" font-size="18" font-weight="bold">Edge Deployment — Fueling Island SBC Setup</text>

  <!-- Island enclosure -->
  <rect x="30" y="70" width="840" height="350" rx="10" fill="#eceff1" stroke="#90a4ae" stroke-width="1.5" filter="url(#ds)"/>
  <text x="450" y="92" text-anchor="middle" font-size="13" font-weight="bold" fill="#455a64">Fueling Island Enclosure</text>

  <!-- LattePanda Board -->
  <rect x="50" y="108" width="260" height="200" rx="8" fill="white" stroke="#1565c0" stroke-width="1.5" filter="url(#ds)"/>
  <rect x="50" y="108" width="260" height="30" rx="8" fill="#1565c0"/>
  <rect x="50" y="124" width="260" height="14" fill="#1565c0"/>
  <text x="180" y="128" text-anchor="middle" font-size="12" font-weight="bold" fill="white">LattePanda 3 Delta 864</text>

  <text x="66" y="158" font-size="10" fill="#333">⬡ Intel Celeron N5105 @ 2.0 GHz</text>
  <text x="66" y="175" font-size="10" fill="#333">⬡ 8 GB LPDDR4 RAM</text>
  <text x="66" y="192" font-size="10" fill="#333">⬡ 64 GB eMMC Storage</text>
  <text x="66" y="209" font-size="10" fill="#333">⬡ Windows 10 Pro / Win32 Client</text>
  <text x="66" y="226" font-size="10" fill="#333">⬡ Ethernet + Wi-Fi 6</text>
  <text x="66" y="243" font-size="10" fill="#333">⬡ USB 3.0 × 3, USB-C</text>

  <rect x="66" y="256" width="228" height="40" rx="4" fill="#e3f2fd" stroke="#42a5f5" stroke-width="0.5"/>
  <text x="180" y="273" text-anchor="middle" font-size="10" font-weight="bold" fill="#1565c0">ATmega32U4 Coprocessor</text>
  <text x="180" y="287" text-anchor="middle" font-size="9" fill="#555">GPIO · Relay Control · Opto-Isolation</text>

  <!-- HID Reader -->
  <rect x="340" y="108" width="200" height="100" rx="8" fill="white" stroke="#7b1fa2" stroke-width="1.5" filter="url(#ds)"/>
  <rect x="340" y="108" width="200" height="28" rx="8" fill="#7b1fa2"/>
  <rect x="340" y="122" width="200" height="14" fill="#7b1fa2"/>
  <text x="440" y="127" text-anchor="middle" font-size="11" font-weight="bold" fill="white">HID OMNIKEY 5427CK</text>

  <text x="356" y="155" font-size="10" fill="#333">⬡ Dual-Frequency Reader</text>
  <text x="356" y="172" font-size="10" fill="#333">⬡ iCLASS SE · MIFARE · Prox</text>
  <text x="356" y="189" font-size="10" fill="#333">⬡ USB HID / PC/SC Interface</text>

  <!-- Display -->
  <rect x="340" y="224" width="200" height="84" rx="8" fill="white" stroke="#00695c" stroke-width="1.5" filter="url(#ds)"/>
  <rect x="340" y="224" width="200" height="28" rx="8" fill="#00695c"/>
  <rect x="340" y="238" width="200" height="14" fill="#00695c"/>
  <text x="440" y="243" text-anchor="middle" font-size="11" font-weight="bold" fill="white">5.7″ Display</text>

  <text x="356" y="273" font-size="10" fill="#333">⬡ Monochrome LCD</text>
  <text x="356" y="290" font-size="10" fill="#333">⬡ Status / Auth / Feedback</text>

  <!-- IGEM Dispenser -->
  <rect x="570" y="108" width="280" height="200" rx="8" fill="white" stroke="#e65100" stroke-width="1.5" filter="url(#ds)"/>
  <rect x="570" y="108" width="280" height="28" rx="8" fill="#e65100"/>
  <rect x="570" y="122" width="280" height="14" fill="#e65100"/>
  <text x="710" y="127" text-anchor="middle" font-size="11" font-weight="bold" fill="white">Fuel Dispenser (IGEM Interface)</text>

  <text x="586" y="155" font-size="10" fill="#333">⬡ IGEM Protocol Communication</text>
  <text x="586" y="172" font-size="10" fill="#333">⬡ Pulse Capture (Flow Metering)</text>
  <text x="586" y="189" font-size="10" fill="#333">⬡ Nozzle State Detection</text>
  <text x="586" y="206" font-size="10" fill="#333">⬡ E-Stop Relay Interface</text>

  <rect x="586" y="218" width="248" height="40" rx="4" fill="#fff3e0" stroke="#ff9800" stroke-width="0.5"/>
  <text x="710" y="235" text-anchor="middle" font-size="10" font-weight="bold" fill="#e65100">Safety Relay Board</text>
  <text x="710" y="249" text-anchor="middle" font-size="9" fill="#555">E-Stop · Tank Alarm · Shutdown Relay</text>

  <rect x="586" y="264" width="248" height="30" rx="4" fill="#fce4ec" stroke="#c62828" stroke-width="0.5"/>
  <text x="710" y="284" text-anchor="middle" font-size="10" font-weight="bold" fill="#c62828">⛔ Physical E-Stop ALWAYS Overrides Software</text>

  <!-- Connection Lines -->
  <line x1="310" y1="180" x2="340" y2="155" stroke="#7b1fa2" stroke-width="1.5" stroke-dasharray="4"/>
  <text x="320" y="162" font-size="7" fill="#7b1fa2">USB</text>

  <line x1="310" y1="240" x2="340" y2="260" stroke="#00695c" stroke-width="1.5" stroke-dasharray="4"/>
  <text x="320" y="254" font-size="7" fill="#00695c">HDMI</text>

  <line x1="310" y1="200" x2="570" y2="180" stroke="#e65100" stroke-width="1.5" stroke-dasharray="4"/>
  <text x="430" y="186" font-size="7" fill="#e65100">IGEM / GPIO</text>

  <!-- Network Connection -->
  <rect x="50" y="330" width="260" height="68" rx="8" fill="white" stroke="#0277bd" stroke-width="1.5" filter="url(#ds)"/>
  <text x="180" y="352" text-anchor="middle" font-size="11" font-weight="bold" fill="#0277bd">Network Connection</text>
  <text x="180" y="370" text-anchor="middle" font-size="10" fill="#555">Ethernet (Primary) · Wi-Fi (Failover)</text>
  <text x="180" y="386" text-anchor="middle" font-size="9" fill="#777">TLS → Central Server · Offline Buffer if Disconnected</text>

  <!-- Tank Monitoring -->
  <rect x="340" y="330" width="510" height="68" rx="8" fill="white" stroke="#2e7d32" stroke-width="1.5" filter="url(#ds)"/>
  <text x="595" y="352" text-anchor="middle" font-size="11" font-weight="bold" fill="#2e7d32">Tank Monitoring Integration</text>
  <text x="595" y="370" text-anchor="middle" font-size="10" fill="#555">EVO 600/6000 Tank Gauge · Level / Temperature / Water Alarms</text>
  <text x="595" y="386" text-anchor="middle" font-size="9" fill="#777">Automatic pump lockout on high-alarm conditions</text>

  <!-- Footer -->
  <text x="450" y="432" text-anchor="middle" font-size="9" fill="#9e9e9e">NEXUS v0.4 — Edge Hardware Configuration — NKY / CVG ConRAC</text>
</svg>
