<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 620" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <linearGradient id="headerGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1a237e"/>
      <stop offset="100%" stop-color="#283593"/>
    </linearGradient>
    <linearGradient id="edgeGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e3f2fd"/>
      <stop offset="100%" stop-color="#bbdefb"/>
    </linearGradient>
    <linearGradient id="coreGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e8f5e9"/>
      <stop offset="100%" stop-color="#c8e6c9"/>
    </linearGradient>
    <linearGradient id="dashGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fff3e0"/>
      <stop offset="100%" stop-color="#ffe0b2"/>
    </linearGradient>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="620" rx="12" fill="#fafafa"/>

  <!-- Title Bar -->
  <rect x="0" y="0" width="900" height="56" rx="12" fill="url(#headerGrad)"/>
  <rect x="0" y="24" width="900" height="32" fill="url(#headerGrad)"/>
  <text x="450" y="37" text-anchor="middle" fill="white" font-size="20" font-weight="bold">NEXUS Facility Operations Platform — Architecture Overview</text>

  <!-- Edge Layer -->
  <rect x="30" y="76" width="840" height="130" rx="10" fill="url(#edgeGrad)" stroke="#1565c0" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="50" y="100" font-size="14" font-weight="bold" fill="#0d47a1">EDGE LAYER — Fueling Island SBCs</text>

  <rect x="50" y="112" width="150" height="76" rx="8" fill="white" stroke="#42a5f5" stroke-width="1"/>
  <text x="125" y="135" text-anchor="middle" font-size="11" font-weight="bold" fill="#1565c0">LattePanda 3 Delta</text>
  <text x="125" y="151" text-anchor="middle" font-size="10" fill="#555">Intel N5105 · 8 GB</text>
  <text x="125" y="165" text-anchor="middle" font-size="10" fill="#555">Win32 Client</text>
  <text x="125" y="179" text-anchor="middle" font-size="10" fill="#555">GPIO + ATmega32U4</text>

  <rect x="220" y="112" width="150" height="76" rx="8" fill="white" stroke="#42a5f5" stroke-width="1"/>
  <text x="295" y="135" text-anchor="middle" font-size="11" font-weight="bold" fill="#1565c0">Safety Engine</text>
  <text x="295" y="151" text-anchor="middle" font-size="10" fill="#555">E-Stop Enforcement</text>
  <text x="295" y="165" text-anchor="middle" font-size="10" fill="#555">Tank Alarm Monitor</text>
  <text x="295" y="179" text-anchor="middle" font-size="10" fill="#555">Offline Operation</text>

  <rect x="390" y="112" width="150" height="76" rx="8" fill="white" stroke="#42a5f5" stroke-width="1"/>
  <text x="465" y="135" text-anchor="middle" font-size="11" font-weight="bold" fill="#1565c0">RFID &amp; Dispensing</text>
  <text x="465" y="151" text-anchor="middle" font-size="10" fill="#555">HID OMNIKEY 5427CK</text>
  <text x="465" y="165" text-anchor="middle" font-size="10" fill="#555">iCLASS SE / MIFARE</text>
  <text x="465" y="179" text-anchor="middle" font-size="10" fill="#555">IGEM Dispenser I/F</text>

  <rect x="560" y="112" width="150" height="76" rx="8" fill="white" stroke="#42a5f5" stroke-width="1"/>
  <text x="635" y="135" text-anchor="middle" font-size="11" font-weight="bold" fill="#1565c0">Transaction Capture</text>
  <text x="635" y="151" text-anchor="middle" font-size="10" fill="#555">Local Logging</text>
  <text x="635" y="165" text-anchor="middle" font-size="10" fill="#555">Offline Buffer</text>
  <text x="635" y="179" text-anchor="middle" font-size="10" fill="#555">Auto-Sync on Reconnect</text>

  <rect x="730" y="112" width="120" height="76" rx="8" fill="white" stroke="#42a5f5" stroke-width="1"/>
  <text x="790" y="135" text-anchor="middle" font-size="11" font-weight="bold" fill="#1565c0">Display</text>
  <text x="790" y="151" text-anchor="middle" font-size="10" fill="#555">5.7″ Monochrome</text>
  <text x="790" y="165" text-anchor="middle" font-size="10" fill="#555">Status / Auth</text>
  <text x="790" y="179" text-anchor="middle" font-size="10" fill="#555">Feedback</text>

  <!-- Arrows between Edge and Core -->
  <line x1="450" y1="206" x2="450" y2="232" stroke="#78909c" stroke-width="2" marker-end="url(#arrowDown)"/>
  <line x1="440" y1="232" x2="440" y2="206" stroke="#78909c" stroke-width="2" marker-end="url(#arrowUp)"/>
  <defs>
    <marker id="arrowDown" markerWidth="8" markerHeight="6" refX="4" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#78909c"/></marker>
    <marker id="arrowUp" markerWidth="8" markerHeight="6" refX="4" refY="3" orient="auto-start-reverse"><path d="M0,0 L8,3 L0,6 Z" fill="#78909c"/></marker>
  </defs>
  <text x="470" y="224" font-size="9" fill="#78909c">TLS / REST / WebSocket</text>

  <!-- Core Layer -->
  <rect x="30" y="236" width="840" height="170" rx="10" fill="url(#coreGrad)" stroke="#2e7d32" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="50" y="260" font-size="14" font-weight="bold" fill="#1b5e20">CORE LAYER — Central Server Microservices (Docker)</text>

  <!-- Row 1 -->
  <rect x="50" y="272" width="125" height="52" rx="6" fill="white" stroke="#66bb6a" stroke-width="1"/>
  <text x="112" y="293" text-anchor="middle" font-size="11" font-weight="bold" fill="#2e7d32">API Gateway</text>
  <text x="112" y="308" text-anchor="middle" font-size="9" fill="#555">:8080 · Routing · Auth</text>

  <rect x="190" y="272" width="125" height="52" rx="6" fill="white" stroke="#66bb6a" stroke-width="1"/>
  <text x="252" y="293" text-anchor="middle" font-size="11" font-weight="bold" fill="#2e7d32">Auth Service</text>
  <text x="252" y="308" text-anchor="middle" font-size="9" fill="#555">JWT · RBAC · Sessions</text>

  <rect x="330" y="272" width="125" height="52" rx="6" fill="white" stroke="#66bb6a" stroke-width="1"/>
  <text x="392" y="293" text-anchor="middle" font-size="11" font-weight="bold" fill="#2e7d32">Event Engine</text>
  <text x="392" y="308" text-anchor="middle" font-size="9" fill="#555">Safety State Machine</text>

  <rect x="470" y="272" width="125" height="52" rx="6" fill="white" stroke="#66bb6a" stroke-width="1"/>
  <text x="532" y="293" text-anchor="middle" font-size="11" font-weight="bold" fill="#2e7d32">Telemetry</text>
  <text x="532" y="308" text-anchor="middle" font-size="9" fill="#555">SBC Data · Tanks</text>

  <rect x="610" y="272" width="125" height="52" rx="6" fill="white" stroke="#66bb6a" stroke-width="1"/>
  <text x="672" y="293" text-anchor="middle" font-size="11" font-weight="bold" fill="#2e7d32">Deployment</text>
  <text x="672" y="308" text-anchor="middle" font-size="9" fill="#555">Remote SBC Update</text>

  <rect x="750" y="272" width="105" height="52" rx="6" fill="white" stroke="#66bb6a" stroke-width="1"/>
  <text x="802" y="293" text-anchor="middle" font-size="11" font-weight="bold" fill="#2e7d32">Card Encoding</text>
  <text x="802" y="308" text-anchor="middle" font-size="9" fill="#555">HID iCLASS SE</text>

  <!-- Row 2 -->
  <rect x="50" y="336" width="125" height="52" rx="6" fill="white" stroke="#66bb6a" stroke-width="1"/>
  <text x="112" y="357" text-anchor="middle" font-size="11" font-weight="bold" fill="#2e7d32">Forms Service</text>
  <text x="112" y="372" text-anchor="middle" font-size="9" fill="#555">Inspections · Compliance</text>

  <rect x="190" y="336" width="125" height="52" rx="6" fill="white" stroke="#66bb6a" stroke-width="1"/>
  <text x="252" y="357" text-anchor="middle" font-size="11" font-weight="bold" fill="#2e7d32">Vendor Service</text>
  <text x="252" y="372" text-anchor="middle" font-size="9" fill="#555">Visits · Service Orders</text>

  <rect x="330" y="336" width="125" height="52" rx="6" fill="white" stroke="#66bb6a" stroke-width="1"/>
  <text x="392" y="357" text-anchor="middle" font-size="11" font-weight="bold" fill="#2e7d32">PostgreSQL 16</text>
  <text x="392" y="372" text-anchor="middle" font-size="9" fill="#555">Persistent Storage</text>

  <rect x="470" y="336" width="265" height="52" rx="6" fill="#e8eaf6" stroke="#5c6bc0" stroke-width="1" stroke-dasharray="4"/>
  <text x="602" y="357" text-anchor="middle" font-size="11" font-weight="bold" fill="#3949ab">FormForce Integration (Optional)</text>
  <text x="602" y="372" text-anchor="middle" font-size="9" fill="#555">External cloud forms platform · Webhook sync</text>

  <!-- Arrows between Core and Dashboard -->
  <line x1="450" y1="406" x2="450" y2="432" stroke="#78909c" stroke-width="2" marker-end="url(#arrowDown)"/>
  <line x1="440" y1="432" x2="440" y2="406" stroke="#78909c" stroke-width="2"/>
  <text x="470" y="424" font-size="9" fill="#78909c">REST API / WebSocket</text>

  <!-- Dashboard Layer -->
  <rect x="30" y="436" width="840" height="160" rx="10" fill="url(#dashGrad)" stroke="#e65100" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="50" y="460" font-size="14" font-weight="bold" fill="#bf360c">INTERFACE LAYER — Web Dashboard (:3000)</text>

  <rect x="50" y="472" width="130" height="56" rx="6" fill="white" stroke="#ff9800" stroke-width="1"/>
  <text x="115" y="494" text-anchor="middle" font-size="11" font-weight="bold" fill="#e65100">Live Monitoring</text>
  <text x="115" y="510" text-anchor="middle" font-size="9" fill="#555">Pumps · Tanks · Alarms</text>

  <rect x="195" y="472" width="130" height="56" rx="6" fill="white" stroke="#ff9800" stroke-width="1"/>
  <text x="260" y="494" text-anchor="middle" font-size="11" font-weight="bold" fill="#e65100">Transaction Log</text>
  <text x="260" y="510" text-anchor="middle" font-size="9" fill="#555">Search · Export · Reports</text>

  <rect x="340" y="472" width="130" height="56" rx="6" fill="white" stroke="#ff9800" stroke-width="1"/>
  <text x="405" y="494" text-anchor="middle" font-size="11" font-weight="bold" fill="#e65100">Forms &amp; Compliance</text>
  <text x="405" y="510" text-anchor="middle" font-size="9" fill="#555">Inspections · Audits</text>

  <rect x="485" y="472" width="130" height="56" rx="6" fill="white" stroke="#ff9800" stroke-width="1"/>
  <text x="550" y="494" text-anchor="middle" font-size="11" font-weight="bold" fill="#e65100">Vendor Mgmt</text>
  <text x="550" y="510" text-anchor="middle" font-size="9" fill="#555">Check-in · Orders</text>

  <rect x="630" y="472" width="130" height="56" rx="6" fill="white" stroke="#ff9800" stroke-width="1"/>
  <text x="695" y="494" text-anchor="middle" font-size="11" font-weight="bold" fill="#e65100">Facility Systems</text>
  <text x="695" y="510" text-anchor="middle" font-size="9" fill="#555">Car Wash · Maintenance</text>

  <rect x="50" y="538" width="710" height="44" rx="6" fill="white" stroke="#ff9800" stroke-width="1"/>
  <text x="405" y="564" text-anchor="middle" font-size="11" font-weight="bold" fill="#e65100">Administration — RFID Card Management · User Roles · Site Configuration · Remote SBC Deployment</text>

  <!-- Footer -->
  <text x="450" y="612" text-anchor="middle" font-size="10" fill="#9e9e9e">NEXUS v0.4 — NKY / CVG ConRAC Beta Deployment</text>
</svg>
